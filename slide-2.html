<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒質チャート</title>
<style>
    :root {
        --primary-blue: #000080;
        --thumb-color: #ff4d6d;
        --dot-color: #2c3e50;
        --track-color: #e0e0e0;
        --bg-color: #f4f4f4;
        --input-bg: #ffffff;
        --input-border: #cccccc;
    }

    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        background-color: #fff;
        display: flex;
        justify-content: center;
        padding: 20px;
        margin: 0;
    }

    .chart-container {
        width: 100%;
        max-width: 800px;
        background-color: var(--bg-color);
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        margin-top: 60px;
    }

    .header-input-wrapper {
        text-align: center;
        margin-bottom: 30px;
        border-bottom: 2px solid #ddd;
        padding-bottom: 10px;
    }

    .header-input {
        font-size: 24px;
        font-weight: bold;
        color: #333;
        letter-spacing: 0.1em;
        text-align: center;
        width: 100%;
        border: none;
        background: transparent;
        font-family: inherit;
        padding: 5px;
    }
    .header-input:focus {
        outline: none;
        border-bottom: 1px solid var(--primary-blue);
    }
    .header-input::placeholder {
        color: #aaa;
    }

    .sake-row {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
        position: relative;
    }

    .label-box {
        width: 80px;
        height: 50px;
        background-color: var(--primary-blue);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 18px;
        border-radius: 8px;
        flex-shrink: 0;
        margin-right: 20px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        transition: background-color 0.2s, transform 0.1s;
    }

    /* 発泡（リセットボタン） */
    .reset-trigger {
        cursor: pointer;
        position: relative;
        background-color: var(--primary-blue);
        color: white;
        transition: background-color 0.2s, color 0.2s;
    }
    .reset-trigger::before {
        content: 'リセット';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 18px;
        color: #333;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
    }
    .reset-trigger:hover {
        background-color: #BBF2A0;
        color: transparent;
    }
    .reset-trigger:hover::before {
        opacity: 1;
    }
    .reset-trigger:active {
        transform: scale(0.96);
    }

    /* スライダー基盤（ver1の完全レスポンシブ設計を採用） */
    .slider-area, .slider-area-half {
        position: relative;
        height: 60px;
    }
    .slider-area { flex: 1; }
    .slider-area-half { flex-shrink: 0; }

    .text-labels {
        position: relative;
        height: 24px;
        width: 100%;
    }
    
    .text-labels span {
        position: absolute;
        font-weight: bold;
        font-size: 14px;
        color: #333;
        white-space: nowrap;
        transform: translateX(-50%);
    }
    /* 端のテキストのはみ出し・重なりを物理的に防止 */
    .text-labels span:first-child { transform: translateX(0); }
    .text-labels span:last-child  { transform: translateX(-100%); }

    .track-wrapper {
        position: relative;
        height: 36px;
        display: flex;
        align-items: center;
    }

    .track {
        position: relative;
        width: calc(100% + 24px);
        margin-left: -12px;
        height: 36px;
        display: flex;
        align-items: center;
        cursor: pointer;
        touch-action: none;
        user-select: none;
    }

    .track-line {
        position: absolute;
        left: 12px;
        right: 12px;
        height: 6px;
        background: var(--track-color);
        border-radius: 3px;
        pointer-events: none;
    }

    .tick-dots {
        position: absolute;
        left: 12px;
        right: 12px;
        display: flex;
        justify-content: space-between;
        pointer-events: none;
    }

    .tick-dot {
        width: 2px;
        height: 14px;
        background-color: var(--dot-color);
        border-radius: 1px;
        flex-shrink: 0;
    }

    .pink-dot {
        position: absolute;
        top: 50%;
        width: 24px;
        height: 24px;
        background: var(--thumb-color);
        border: 2px solid white;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        transition: box-shadow 0.12s;
    }

    .pink-dot.active {
        box-shadow: 0 0 0 8px rgba(255, 77, 109, 0.25);
    }

    .impression-area {
        margin-top: 40px;
        padding-top: 10px;
    }
    
    .impression-box {
        width: 100%;
        height: 80px;
        border: 1px solid var(--input-border);
        border-radius: 4px;
        background: var(--input-bg);
        padding: 15px;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 18px;
        line-height: 1.6;
        resize: vertical;
        color: #333;
    }
    .impression-box:focus {
        outline: none;
        border-color: var(--primary-blue);
    }
    .impression-box::placeholder {
        color: #aaa;
    }
</style>
</head>
<body>

<div class="chart-container">
    <div class="header-input-wrapper">
        <input type="text" id="sake-name" class="header-input" placeholder="日本酒の銘柄を入力">
    </div>

    <div class="sake-row">
        <div class="label-box">甘辛</div>
        <div class="slider-area">
            <div class="text-labels">
                <span style="left:0%">甘口</span>
                <span style="left:25%">やや甘口</span>
                <span style="left:50%">中口</span>
                <span style="left:75%">やや辛口</span>
                <span style="left:100%">辛口</span>
            </div>
            <div class="track-wrapper">
                <div class="track" data-ticks="5" data-default="50">
                    <div class="track-line"></div>
                    <div class="tick-dots"></div>
                    <div class="pink-dot"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="sake-row">
        <div class="label-box">濃淡</div>
        <div class="slider-area">
            <div class="text-labels">
                <span style="left:0%">濃醇</span>
                <span style="left:25%">やや濃醇</span>
                <span style="left:50%">普通</span>
                <span style="left:75%">やや淡麗</span>
                <span style="left:100%">淡麗</span>
            </div>
            <div class="track-wrapper">
                <div class="track" data-ticks="5" data-default="50">
                    <div class="track-line"></div>
                    <div class="tick-dots"></div>
                    <div class="pink-dot"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="sake-row">
        <div class="label-box">香り</div>
        <div class="slider-area-half">
            <div class="text-labels">
                <span style="left:0%">強い</span>
                <span style="left:50%">ややある</span>
                <span style="left:100%">普通</span>
            </div>
            <div class="track-wrapper">
                <div class="track" data-ticks="3" data-default="100">
                    <div class="track-line"></div>
                    <div class="tick-dots"></div>
                    <div class="pink-dot"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="sake-row">
        <div class="label-box">酸</div>
        <div class="slider-area-half">
            <div class="text-labels">
                <span style="left:0%">強い</span>
                <span style="left:50%">ややある</span>
                <span style="left:100%">無し</span>
            </div>
            <div class="track-wrapper">
                <div class="track" data-ticks="3" data-default="100">
                    <div class="track-line"></div>
                    <div class="tick-dots"></div>
                    <div class="pink-dot"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="sake-row">
        <div class="label-box">苦味</div>
        <div class="slider-area-half">
            <div class="text-labels">
                <span style="left:0%">強い</span>
                <span style="left:50%">ややある</span>
                <span style="left:100%">無し</span>
            </div>
            <div class="track-wrapper">
                <div class="track" data-ticks="3" data-default="100">
                    <div class="track-line"></div>
                    <div class="tick-dots"></div>
                    <div class="pink-dot"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="sake-row">
        <div class="label-box reset-trigger" id="reset-btn">発泡</div>
        <div class="slider-area-half">
            <div class="text-labels">
                <span style="left:0%">強い</span>
                <span style="left:50%">ややある</span>
                <span style="left:100%">無し</span>
            </div>
            <div class="track-wrapper">
                <div class="track" data-ticks="3" data-default="100">
                    <div class="track-line"></div>
                    <div class="tick-dots"></div>
                    <div class="pink-dot"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="impression-area">
        <textarea id="impression-text" class="impression-box" placeholder="第一印象を入力..."></textarea>
    </div>
</div>

<script>
(function() {
    // 現在保持している各スライダーのパーセント値を記憶する配列
    var sliderStates = [];

    // スライダーの幅の調整と、現在の％値に基づいた赤丸位置の「再計算」を統合
    function updateLayout() {
        var fullArea = document.querySelector('.slider-area');
        if (!fullArea) return;
        
        var halfWidth = Math.floor(fullArea.offsetWidth / 2);
        document.querySelectorAll('.slider-area-half').forEach(function(el) {
            el.style.width = halfWidth + 'px';
        });

        // 画面サイズ変更に合わせて、すべての赤丸の位置を再計算して再吸着させる（はみ出しバグ対策）
        document.querySelectorAll('.track').forEach(function(track, index) {
            var dotEl = track.querySelector('.pink-dot');
            if (dotEl && sliderStates[index] !== undefined) {
                setDotPct(dotEl, sliderStates[index]);
            }
        });
    }

    function buildDots(dotsEl, ticks) {
        dotsEl.innerHTML = '';
        for (var i = 0; i < ticks; i++) {
            var d = document.createElement('div');
            d.className = 'tick-dot';
            dotsEl.appendChild(d);
        }
    }

    function setDotPct(dotEl, pct) {
        var track = dotEl.parentElement;
        var trackWidth = track.offsetWidth;
        var innerWidth = trackWidth - 24; // thumb補正(24px)
        var px = 12 + (innerWidth * Math.max(0, Math.min(100, pct)) / 100);
        dotEl.style.left = px + 'px';
    }

    function initTrack(track, index) {
        var ticks = parseInt(track.dataset.ticks, 10);
        var defaultPct = parseFloat(track.dataset.default);
        var dotsEl = track.querySelector('.tick-dots');
        var dotEl = track.querySelector('.pink-dot');
        
        // 初期状態を記憶
        sliderStates[index] = defaultPct;

        buildDots(dotsEl, ticks);
        setDotPct(dotEl, sliderStates[index]);

        function pctFrom(clientX) {
            var rect = track.getBoundingClientRect();
            return Math.max(0, Math.min(100, (clientX - rect.left - 12) / (rect.width - 24) * 100));
        }

        var dragging = false;

        function onStart(clientX) {
            dragging = true;
            dotEl.classList.add('active');
            sliderStates[index] = pctFrom(clientX);
            setDotPct(dotEl, sliderStates[index]);
        }
        function onMove(clientX) {
            if (!dragging) return;
            sliderStates[index] = pctFrom(clientX);
            setDotPct(dotEl, sliderStates[index]);
        }
        function onEnd() {
            dragging = false;
            dotEl.classList.remove('active');
        }

        function addTouch(el) {
            el.addEventListener('touchstart', function(e) {
                e.preventDefault();
                onStart(e.touches[0].clientX);
            }, { passive: false });
            el.addEventListener('touchmove', function(e) {
                e.preventDefault();
                onMove(e.touches[0].clientX);
            }, { passive: false });
            el.addEventListener('touchend', onEnd);
        }

        function addMouse(el) {
            el.addEventListener('mousedown', function(e) {
                onStart(e.clientX);
                function mm(ev) { onMove(ev.clientX); }
                function mu() { onEnd(); document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); }
                document.addEventListener('mousemove', mm);
                document.addEventListener('mouseup', mu);
            });
        }

        addTouch(track);
        addTouch(dotEl);
        addMouse(track);
        addMouse(dotEl);

        track._reset = function() {
            sliderStates[index] = defaultPct;
            setDotPct(dotEl, defaultPct);
        };
    }

    // 初期化
    window.addEventListener('load', function() {
        setTimeout(function() {
            document.querySelectorAll('.track').forEach(initTrack);
            updateLayout();
        }, 50);
    });

    // 画面の縦横切り替え（リサイズ）を検知して自動で位置補正
    window.addEventListener('resize', updateLayout);

    // リセット処理
    document.getElementById('reset-btn').addEventListener('click', function() {
        document.getElementById('sake-name').value = '';
        document.getElementById('impression-text').value = '';
        document.querySelectorAll('.track').forEach(function(t) {
            if (t._reset) t._reset();
        });
    });
})();
</script>

</body>
</html>
