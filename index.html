<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒質チャート</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    font-family: "Meiryo", "メイリオ", "Hiragino Kaku Gothic ProN", sans-serif;
    font-weight: 700;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    min-height: 100vh;
  }

  .container { width: 476px; }

  .title-input {
    display: block;
    text-align: center;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.1em;
    margin-bottom: 0;
    color: #111;
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    font-family: inherit;
    padding: 0;
    line-height: 1;
  }

  .divider {
    border: none;
    border-top: 1.5px solid #999;
    margin: 1px auto 32px;
    width: 70%;
  }

  .row {
    display: flex;
    align-items: center;
    margin-bottom: 14px;
  }

  .label {
    background: #7a7a2a;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.1em;
    width: 72px;
    min-width: 72px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    margin-right: 20px;
  }

  .slider-area {
    flex: 1;
    position: relative;
    padding-top: 16px;
  }

  .slider-area-half {
    flex-shrink: 0;
    position: relative;
    padding-top: 16px;
  }

  .tick-labels {
    position: relative;
    height: 18px;
    margin-bottom: 6px;
  }

  .tick-label {
    position: absolute;
    font-size: 12px;
    font-family: "Meiryo", "メイリオ", "Hiragino Kaku Gothic ProN", sans-serif;
    font-weight: 700;
    color: #333;
    white-space: nowrap;
    transform: translateX(-50%);
  }
  .tick-label:first-child { transform: translateX(0); }
  .tick-label:last-child  { transform: translateX(-100%); }

  .track-wrapper {
    position: relative;
    height: 29px;
    display: flex;
    align-items: center;
  }

  /* トラック本体：タッチ領域を十分確保するため高さを持たせる */
  .track {
    position: relative;
    width: 100%;
    height: 29px;
    display: flex;
    align-items: center;
    cursor: pointer;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* 見た目のライン */
  .track-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: #bbb;
    border-radius: 2px;
    pointer-events: none;
  }

  .tick-dots {
    position: absolute;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
  }

  .tick-dot {
    width: 8px;
    height: 8px;
    background: #2a2a4a;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pink-dot {
    position: absolute;
    top: 50%;
    width: 29px;
    height: 29px;
    background: #e8336a;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    cursor: grab;
    z-index: 10;
    pointer-events: none; /* ← ポインターはtrackで一元管理 */
    user-select: none;
    -webkit-user-select: none;
  }
  .track.dragging .pink-dot {
    cursor: grabbing;
    box-shadow: 0 0 0 8px rgba(232,51,106,0.25);
  }
  .track:not(.dragging):hover .pink-dot {
    box-shadow: 0 0 0 6px rgba(232,51,106,0.18);
  }
</style>
</head>
<body>
<div class="container">
  <input class="title-input" type="text" value="純米吟醸　無濾過">
  <hr class="divider">

  <!-- 甘辛: 5目盛り 全幅 -->
  <div class="row">
    <div class="label">甘辛</div>
    <div class="slider-area">
      <div class="tick-labels">
        <span class="tick-label" style="left:0%">甘口</span>
        <span class="tick-label" style="left:25%">やや甘口</span>
        <span class="tick-label" style="left:50%">中口</span>
        <span class="tick-label" style="left:75%">やや辛口</span>
        <span class="tick-label" style="left:100%">辛口</span>
      </div>
      <div class="track-wrapper">
        <div class="track" data-ticks="5" data-default="50">
          <div class="track-line"></div>
          <div class="tick-dots"></div>
          <div class="pink-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 濃淡: 5目盛り 全幅 -->
  <div class="row">
    <div class="label">濃淡</div>
    <div class="slider-area">
      <div class="tick-labels">
        <span class="tick-label" style="left:0%">濃醇</span>
        <span class="tick-label" style="left:25%">やや濃醇</span>
        <span class="tick-label" style="left:50%">普通</span>
        <span class="tick-label" style="left:75%">やや淡麗</span>
        <span class="tick-label" style="left:100%">淡麗</span>
      </div>
      <div class="track-wrapper">
        <div class="track" data-ticks="5" data-default="50">
          <div class="track-line"></div>
          <div class="tick-dots"></div>
          <div class="pink-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 香り: 3目盛り 半幅 -->
  <div class="row">
    <div class="label">香り</div>
    <div class="slider-area-half">
      <div class="tick-labels">
        <span class="tick-label" style="left:0%">強い</span>
        <span class="tick-label" style="left:50%">やや有る</span>
        <span class="tick-label" style="left:100%">普通</span>
      </div>
      <div class="track-wrapper">
        <div class="track" data-ticks="3" data-default="100">
          <div class="track-line"></div>
          <div class="tick-dots"></div>
          <div class="pink-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 酸: 3目盛り 半幅 -->
  <div class="row">
    <div class="label">酸</div>
    <div class="slider-area-half">
      <div class="tick-labels">
        <span class="tick-label" style="left:0%">強い</span>
        <span class="tick-label" style="left:50%">やや有る</span>
        <span class="tick-label" style="left:100%">無し</span>
      </div>
      <div class="track-wrapper">
        <div class="track" data-ticks="3" data-default="100">
          <div class="track-line"></div>
          <div class="tick-dots"></div>
          <div class="pink-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 苦味: 3目盛り 半幅 -->
  <div class="row">
    <div class="label">苦味</div>
    <div class="slider-area-half">
      <div class="tick-labels">
        <span class="tick-label" style="left:0%">強い</span>
        <span class="tick-label" style="left:50%">やや有る</span>
        <span class="tick-label" style="left:100%">無し</span>
      </div>
      <div class="track-wrapper">
        <div class="track" data-ticks="3" data-default="100">
          <div class="track-line"></div>
          <div class="tick-dots"></div>
          <div class="pink-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 発泡: 3目盛り 半幅 -->
  <div class="row">
    <div class="label" id="reset-btn" style="cursor:pointer" title="リセット">発泡</div>
    <div class="slider-area-half">
      <div class="tick-labels">
        <span class="tick-label" style="left:0%">強い</span>
        <span class="tick-label" style="left:50%">やや有る</span>
        <span class="tick-label" style="left:100%">無し</span>
      </div>
      <div class="track-wrapper">
        <div class="track" data-ticks="3" data-default="100">
          <div class="track-line"></div>
          <div class="tick-dots"></div>
          <div class="pink-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 第一印象 -->
  <div style="margin-top: 24px; padding-top: 8px;">
    <div style="display:flex; align-items:baseline; gap:8px;">
      <span style="font-size:14px; font-weight:700; white-space:nowrap;">第一印象：</span>
      <input type="text" id="impression"
        style="flex:1; border:none; border-bottom:1.5px solid #999; outline:none;
               font-size:14px; font-weight:700; font-family:'Meiryo','メイリオ',sans-serif;
               background:transparent; padding:2px 0; width:100%;"
        placeholder="">
    </div>
  </div>
</div>

<script>
(function() {
  // 半幅スライダーの幅をセット
  function setHalfWidths() {
    var fullArea = document.querySelector('.slider-area');
    if (!fullArea) return;
    var halfWidth = fullArea.offsetWidth / 2;
    document.querySelectorAll('.slider-area-half').forEach(function(el) {
      el.style.width = halfWidth + 'px';
    });
  }

  // 目盛りドットを生成
  function buildDots(dotsEl, ticks) {
    dotsEl.innerHTML = '';
    for (var i = 0; i < ticks; i++) {
      var d = document.createElement('div');
      d.className = 'tick-dot';
      if (ticks === 5 && i === 2) {
        d.style.width = '10px';
        d.style.height = '10px';
      }
      dotsEl.appendChild(d);
    }
  }

  // pct(0〜100)を赤丸にセット
  function setDotPct(dotEl, pct) {
    dotEl.style.left = Math.max(0, Math.min(100, pct)) + '%';
  }

  // trackのBoundingRectからpct計算
  function pctFromClientX(track, clientX) {
    var rect = track.getBoundingClientRect();
    return Math.max(0, Math.min(100, (clientX - rect.left) / rect.width * 100));
  }

  // 各trackを初期化
  function initTrack(track) {
    var ticks      = parseInt(track.dataset.ticks, 10);
    var defaultPct = parseFloat(track.dataset.default);
    var dotsEl     = track.querySelector('.tick-dots');
    var dotEl      = track.querySelector('.pink-dot');
    var curPct     = defaultPct;
    var dragging   = false;

    buildDots(dotsEl, ticks);
    setDotPct(dotEl, curPct);

    // --- pointer events で一元管理 ---
    track.addEventListener('pointerdown', function(e) {
      // テキスト選択など抑制
      e.preventDefault();
      track.setPointerCapture(e.pointerId);
      dragging = true;
      track.classList.add('dragging');
      // タップした位置に即座に移動
      curPct = pctFromClientX(track, e.clientX);
      setDotPct(dotEl, curPct);
    });

    track.addEventListener('pointermove', function(e) {
      if (!dragging) return;
      curPct = pctFromClientX(track, e.clientX);
      setDotPct(dotEl, curPct);
    });

    track.addEventListener('pointerup', function(e) {
      if (!dragging) return;
      dragging = false;
      track.classList.remove('dragging');
    });

    track.addEventListener('pointercancel', function(e) {
      dragging = false;
      track.classList.remove('dragging');
    });

    // リセット用
    track._reset = function() {
      curPct = defaultPct;
      setDotPct(dotEl, curPct);
    };
  }

  // リセット
  function resetAll() {
    document.querySelectorAll('.track').forEach(function(t) {
      if (t._reset) t._reset();
    });
    document.getElementById('impression').value = '';
    document.querySelector('.title-input').value = '純米吟醸　無濾過';
  }

  // 初期化
  window.addEventListener('load', function() {
    setTimeout(function() {
      setHalfWidths();
      requestAnimationFrame(function() {
        document.querySelectorAll('.track').forEach(initTrack);
      });
    });
  });

  window.addEventListener('resize', setHalfWidths);

  document.getElementById('reset-btn').addEventListener('click', resetAll);
})();
</script>
</body>
</html>
