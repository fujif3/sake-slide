<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒質チャート</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    font-family: "Meiryo", "メイリオ", "Hiragino Kaku Gothic ProN", sans-serif;
    font-weight: 700;
    display: flex;
    justify-content: center;
    /* 左右に少しだけ(5px)余白を持たせると枠線が画面端に張り付きすぎず綺麗です */
    padding: 60px 5px 10px;
    min-height: unset;
  }

  .container {
    /* 固定幅を解除し、100%に設定 */
    width: 100%;
    /* 大きな画面で見るときのために最大幅を設定（お好みで調整してください） */
    max-width: 450px;
    border: 1.5px solid rgba(122,122,42,0.2);
    border-radius: 6px;
    padding: 8px 0.8em 2em;
    background: #fff;
  }

  .title-input {
    display: block;
    text-align: center;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 0.1em;
    margin-bottom: 0;
    color: #111;
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    font-family: inherit;
    padding: 4px 0;
    line-height: 1.2;
  }

  .divider {
    border: none;
    border-top: 1.5px solid #999;
    margin: 2px auto 16px;
    width: 70%;
  }

  .row {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    width: 100%;
  }

  .label {
    background: #7a7a2a;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    width: 48px;
    min-width: 48px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    margin-right: 15px; /* 余白を少し詰めました */
  }

  .slider-area {
    flex: 1;
    position: relative;
  }

  /* 半幅エリアも親の幅に対して柔軟になるよう調整 */
  .slider-area-half {
    width: 55%; 
    position: relative;
  }

  .tick-labels {
    position: relative;
    height: 16px;
    margin-bottom: 2px;
  }

  .tick-label {
    position: absolute;
    font-size: 10px;
    font-family: inherit;
    font-weight: 700;
    color: #333;
    white-space: nowrap;
    transform: translateX(-50%);
  }
  .tick-label:first-child { transform: translateX(0); }
  .tick-label:last-child  { transform: translateX(-100%); }

  .track-wrapper {
    position: relative;
    height: 24px;
    display: flex;
    align-items: center;
  }

  .track {
    position: relative;
    width: calc(100% + 14px);
    margin-left: -7px;
    height: 24px;
    display: flex;
    align-items: center;
    cursor: pointer;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  .track-line {
    position: absolute;
    left: 7px;
    right: 7px;
    height: 2px;
    background: #bbb;
    border-radius: 2px;
    pointer-events: none;
  }

  .tick-dots {
    position: absolute;
    left: 7px;
    right: 7px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
  }

  .tick-dot {
    width: 8px;
    height: 8px;
    background: #2a2a4a;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pink-dot {
    position: absolute;
    top: 50%;
    width: 14px;
    height: 14px;
    background: #e8336a;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    pointer-events: auto;
    transition: box-shadow 0.12s;
  }
  .pink-dot.active {
    box-shadow: 0 0 0 8px rgba(232,51,106,0.25);
  }
</style>
</head>
<body>

<div class="container">
  <input class="title-input" type="text" value="純米吟醸　無濾過">
  <hr class="divider">

  <div class="row">
    <div class="label">甘辛</div>
    <div class="slider-area">
      <div class="tick-labels">
        <span class="tick-label" style="left:0%">甘口</span>
        <span class="tick-label" style="left:25%">やや甘口</span>
        <span class="tick-label" style="left:50%">中口</span>
        <span class="tick-label" style="left:75%">やや辛口</span>
        <span class="tick-label" style="left:100%">辛口</span>
      </div>
      <div class="track-wrapper">
        <div class="track" data-ticks="5" data-default="50">
          <div class="track-line"></div>
          <div class="tick-dots"></div>
          <div class="pink-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="label">濃淡</div>
    <div class="slider-area">
      <div class="tick-labels">
        <span class="tick-label" style="left:0%">濃醇</span>
        <span class="tick-label" style="left:25%">やや濃醇</span>
        <span class="tick-label" style="left:50%">普通</span>
        <span class="tick-label" style="left:75%">やや淡麗</span>
        <span class="tick-label" style="left:100%">淡麗</span>
      </div>
      <div class="track-wrapper">
        <div class="track" data-ticks="5" data-default="50">
          <div class="track-line"></div>
          <div class="tick-dots"></div>
          <div class="pink-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="label">香り</div>
    <div class="slider-area-half">
      <div class="tick-labels">
        <span class="tick-label" style="left:0%">強い</span>
        <span class="tick-label" style="left:50%">やや有る</span>
        <span class="tick-label" style="left:100%">普通</span>
      </div>
      <div class="track-wrapper">
        <div class="track" data-ticks="3" data-default="100">
          <div class="track-line"></div>
          <div class="tick-dots"></div>
          <div class="pink-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="label">酸</div>
    <div class="slider-area-half">
      <div class="tick-labels">
        <span class="tick-label" style="left:0%">強い</span>
        <span class="tick-label" style="left:50%">やや有る</span>
        <span class="tick-label" style="left:100%">無し</span>
      </div>
      <div class="track-wrapper">
        <div class="track" data-ticks="3" data-default="100">
          <div class="track-line"></div>
          <div class="tick-dots"></div>
          <div class="pink-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="label">苦味</div>
    <div class="slider-area-half">
      <div class="tick-labels">
        <span class="tick-label" style="left:0%">強い</span>
        <span class="tick-label" style="left:50%">やや有る</span>
        <span class="tick-label" style="left:100%">無し</span>
      </div>
      <div class="track-wrapper">
        <div class="track" data-ticks="3" data-default="100">
          <div class="track-line"></div>
          <div class="tick-dots"></div>
          <div class="pink-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="label" id="reset-btn" style="cursor:pointer" title="リセット">発泡</div>
    <div class="slider-area-half">
      <div class="tick-labels">
        <span class="tick-label" style="left:0%">強い</span>
        <span class="tick-label" style="left:50%">やや有る</span>
        <span class="tick-label" style="left:100%">無し</span>
      </div>
      <div class="track-wrapper">
        <div class="track" data-ticks="3" data-default="100">
          <div class="track-line"></div>
          <div class="tick-dots"></div>
          <div class="pink-dot"></div>
        </div>
      </div>
    </div>
  </div>

  <div style="margin-top: 10px;">
    <div style="display:flex; align-items:baseline; gap:8px;">
      <span style="font-size:11px; font-weight:700; white-space:nowrap;">第一印象：</span>
      <input type="text" id="impression"
        style="flex:1; border:none; border-bottom:1.5px solid #999; outline:none;
               font-size:11px; font-weight:700; font-family:inherit;
               background:transparent; padding:2px 0; width:100%;"
        placeholder="">
    </div>
  </div>
</div>

<script>
(function() {
  // slider-area-half の幅を slider-area の半分＋アルファに調整する関数
  function setHalfWidths() {
    var fullArea = document.querySelector('.slider-area');
    if (!fullArea) return;
    // 画面幅に合わせて動的に計算
    var halfWidth = (fullArea.offsetWidth / 2) + 12;
    document.querySelectorAll('.slider-area-half').forEach(function(el) {
      el.style.width = halfWidth + 'px';
    });
  }

  function buildDots(dotsEl, ticks) {
    dotsEl.innerHTML = '';
    // 3目盛りの時の微調整用
    if (ticks === 3) {
      dotsEl.style.left = '7px';
      dotsEl.style.right = '4px';
    } else {
      dotsEl.style.left = '7px';
      dotsEl.style.right = '7px';
    }
    for (var i = 0; i < ticks; i++) {
      var d = document.createElement('div');
      d.className = 'tick-dot';
      if (ticks === 5 && i === 2) {
        d.style.width = '10px';
        d.style.height = '10px';
      }
      dotsEl.appendChild(d);
    }
  }

  function setDotPct(dotEl, pct) {
    var track = dotEl.parentElement;
    var ticks = parseInt(track.dataset.ticks, 10);
    var trackWidth = track.offsetWidth;
    var innerWidth = trackWidth - 14;
    var px = 7 + (innerWidth * Math.max(0, Math.min(100, pct)) / 100);
    // 3目盛りの右端微調整
    if (ticks === 3 && pct === 100) px -= 2;
    dotEl.style.left = px + 'px';
  }

  function initTrack(track) {
    var ticks      = parseInt(track.dataset.ticks, 10);
    var defaultPct = parseFloat(track.dataset.default);
    var dotsEl     = track.querySelector('.tick-dots');
    var dotEl      = track.querySelector('.pink-dot');
    var curPct     = defaultPct;
    var dragging   = false;

    buildDots(dotsEl, ticks);
    setDotPct(dotEl, curPct);

    function pctFrom(clientX) {
      var rect = track.getBoundingClientRect();
      var val = (clientX - rect.left - 7) / (rect.width - 14) * 100;
      return Math.max(0, Math.min(100, val));
    }

    function update(clientX) {
      curPct = pctFrom(clientX);
      setDotPct(dotEl, curPct);
    }

    function onStart(clientX) {
      dragging = true;
      dotEl.classList.add('active');
      update(clientX);
    }
    function onMove(clientX) {
      if (!dragging) return;
      update(clientX);
    }
    function onEnd() {
      dragging = false;
      dotEl.classList.remove('active');
    }

    track.addEventListener('touchstart', function(e) {
      e.preventDefault();
      onStart(e.touches[0].clientX);
    }, { passive: false });
    window.addEventListener('touchmove', function(e) {
      if (dragging) {
        e.preventDefault();
        onMove(e.touches[0].clientX);
      }
    }, { passive: false });
    window.addEventListener('touchend', onEnd);

    track.addEventListener('mousedown', function(e) {
      onStart(e.clientX);
      function mm(ev) { onMove(ev.clientX); }
      function mu() { onEnd(); window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); }
      window.addEventListener('mousemove', mm);
      window.addEventListener('mouseup', mu);
    });

    track._reset = function() {
      curPct = defaultPct;
      setDotPct(dotEl, curPct);
    };
  }

  function resetAll() {
    document.querySelectorAll('.track').forEach(function(t) {
      if (t._reset) t._reset();
    });
    document.getElementById('impression').value = '';
    document.querySelector('.title-input').value = '純米吟醸　無濾過';
  }

  window.addEventListener('load', function() {
    setHalfWidths();
    document.querySelectorAll('.track').forEach(initTrack);
  });

  window.addEventListener('resize', function() {
    setHalfWidths();
    // リサイズ時にドットの位置を再計算
    document.querySelectorAll('.pink-dot').forEach(function(dot) {
      // 現在の位置(px)ではなく%で再配置する必要があるため簡易的に
      var track = dot.parentElement;
      var rect = dot.getBoundingClientRect();
      var trackRect = track.getBoundingClientRect();
      var pct = (rect.left + rect.width/2 - trackRect.left - 7) / (trackRect.width - 14) * 100;
      setDotPct(dot, pct);
    });
  });

  document.getElementById('reset-btn').addEventListener('click', resetAll);
})();
</script>

</body>
</html>
